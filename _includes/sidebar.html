<div class="col-box col-box-author">
  <img class="avatar" src="{{ site.avatar }}" alt="{{ site.author }}">
  <div class="col-box-title name">{{ site.author }}</div>
  <p>{{ site.profile }}</p>
  <!--<p class="contact">-->
  <p class="contact">
    <a href="https://www.linkedin.com/in/{{ site.github_username }}"><i class="fa fa-linkedin-square" aria-hidden="true"></i></a>
    <a href="https://twitter.com/{{ site.twitter_username }}"><i class="fa fa-twitter-square" aria-hidden="true"></i></a>
    <a href="https://instagram.com/{{ site.instagram_username }}"><i class="fa fa-instagram" aria-hidden="true"></i></a>
    <a href="https://facebook.com/{{ site.facebook_username }}"><i class="fa fa-facebook-square" aria-hidden="true"></i></a>
    <a href="mailto:{{ site.email }}"><i class="fa fa-envelope" aria-hidden="true"></i></a>
    <script type="text/javascript" src="https://secure.skypeassets.com/i/scom/js/skype-uri.js"></script>
<div id="SkypeButton_Call_ohoncharuk_1">
 <script type="text/javascript">
 Skype.ui({
 "name": "chat",
 "element": "SkypeButton_Call_ohoncharuk_1",
 "participants": ["ohoncharuk"]
 });
 </script>
</div>
  </p>
</div>

<div class="col-box">
  <div class="col-box-title">Newest Posts</div>
  <ul class="post-list">
    {% for post in site.posts limit:5 %}
      <li><a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
</div>

<div class="col-box post-toc hide">
  <div class="col-box-title">TOC</div>
</div>
